openapi: 3.0.3
info:
  title: Fess - User API (v2)
  description: |-
    v2 of the Fess user-facing Web API. All responses share a uniform envelope:

    ```json
    { "response": { "status": <int>, ... } }
    ```

    `status` follows the v1 convention: `0` = success, `1` = client error,
    `9` = system error. On error the envelope additionally contains an
    `error` object with stable `code` (snake_case) and a human-readable
    `message` (English; clients should localize on `code`). The default HTTP
    status code matches the envelope's `error.code` (e.g. `invalid_request`
    → 400, `auth_required` → 401, `forbidden` → 403, `not_found` → 404,
    `method_not_allowed` → 405, `not_acceptable` → 406, `payload_too_large`
    → 413, `unsupported_media_type` → 415, `rate_limited` → 429,
    `internal_error` → 500, `service_unavailable` → 503).

    State-changing endpoints (`POST` / `PUT` / `DELETE`) require the
    `X-Fess-CSRF-Token` header. Acquire the token from
    `POST /auth/login` (in the `csrf_token` field) or from
    `GET /ui/config`. The token rotates on
    login, logout, and password change.

    CSRF verification runs **before** authentication, so a state-changing
    request that carries neither a session nor a valid CSRF token receives
    `403 forbidden` (not `401 auth_required`). `/auth/login` is exempt from
    CSRF since no token can exist prior to login.

    `/chat/stream` emits Server-Sent Events (`text/event-stream`).
    `/documents/all` emits NDJSON (`application/x-ndjson`); each line is a
    `{"data": {...}}` object except the final line on a mid-stream failure,
    which is `{"error": {...}}`.

    **Field naming.** All JSON payloads — request bodies, response bodies,
    and SSE event data — use `snake_case` keys consistently.

    **Method-not-allowed responses** carry an `Allow` header listing the
    supported HTTP methods for the endpoint.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 15.7.0
externalDocs:
  description: API Documentation
  url: https://fess.codelibs.org/15.7/api/
servers:
  - url: http://localhost:8080/api/v2
tags:
  - name: search
    description: Search operations
  - name: suggest
    description: Suggest operations
  - name: popularword
    description: Popular word operations
  - name: monitor
    description: Monitoring operations
  - name: favorite
    description: Favorite operations
  - name: auth
    description: Authentication and session operations
  - name: ui
    description: UI bootstrap and configuration
  - name: click
    description: Click logging
  - name: chat
    description: RAG chat operations
  - name: cache
    description: Cached document content
  - name: related
    description: Related query and content suggestions

paths:
  /health:
    get:
      tags: [monitor]
      summary: Cluster health snapshot
      description: |-
        Returns a snapshot of the search engine's cluster health. HTTP status
        is `200` for `green`/`yellow` and `503` for `red`. The envelope obeys
        the canonical invariant `status >= 1 iff HTTP >= 400`: green/yellow
        emit a success envelope (`status: 0`) carrying `engine`, red emits an
        error envelope (`status: 9`, `error.code: service_unavailable`) with
        the engine snapshot embedded under `error.details.engine` so
        monitoring tools can still parse cluster metadata.
      operationId: healthV2
      responses:
        '200':
          description: Cluster is reachable (status `green` or `yellow`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '503':
          description: |-
            Cluster reports `red`. The response is the standard v2 error
            envelope with `error.code: service_unavailable` and the engine
            snapshot under `error.details.engine`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /search:
    get:
      tags: [search]
      summary: Search documents
      description: |-
        Mirrors the v1 `/documents` shape but emits the v2 envelope. Field
        names inside the payload remain snake_case.
      operationId: searchV2
      parameters:
        - { $ref: '#/components/parameters/Q' }
        - name: start
          in: query
          description: |-
            0-based start position. Depends on `query.max.search.result.offset`.
          required: false
          schema: { type: integer, minimum: 0, maximum: 100000, default: 0 }
        - name: offset
          in: query
          description: |-
            Offset from `start`. Depends on `query.max.search.result.offset`.
          required: false
          schema: { type: integer, minimum: 0, maximum: 100000, default: 0 }
        - name: num
          in: query
          description: |-
            Page size. Values `<= 0` produce `invalid_request`. Values above
            the configured maximum are silently clamped — clients can detect
            clamping by comparing the request `num` with the response
            `page_size` field. Effective upper bound is clamped by
            `paging.search.page.max.size`.
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: sort
          in: query
          required: false
          schema: { type: string, maxLength: 1000, example: score }
        - name: lang
          in: query
          description: Repeatable.
          required: false
          style: form
          explode: true
          schema: { type: array, maxItems: 100, items: { type: string, maxLength: 1000 }, example: [en] }
        - name: ex_q
          in: query
          description: Extra query expression; repeatable.
          required: false
          style: form
          explode: true
          schema: { type: array, maxItems: 100, items: { type: string, maxLength: 1000 } }
        - name: sdh
          in: query
          description: Similar-document hash.
          required: false
          schema: { type: string, maxLength: 1000 }
        - name: fields.label
          in: query
          description: |-
            Filter by label name; repeatable. This is the most common case of
            the generic `fields.<name>` family — any `fields.<name>` query
            parameter restricts results where the document field `<name>`
            matches the supplied value(s).
          required: false
          style: form
          explode: true
          schema: { type: array, maxItems: 100, items: { type: string, maxLength: 1000 }, example: [news] }
        - name: as.*
          in: query
          description: |-
            Advanced-search conditions. Any `as.<name>` parameter (e.g.
            `as.q`, `as.filetype`) is forwarded to the advanced-search
            condition builder. Repeatable per name.
          required: false
          schema: { type: string, maxLength: 1000 }
        - name: track_total_hits
          in: query
          description: |-
            Forwarded to the search engine to control exact hit counting
            (e.g. `true` or an integer threshold). Affects whether
            `record_count_relation` is `eq` or `gte`.
          required: false
          schema: { type: string, maxLength: 100 }
        - name: facet.field
          in: query
          required: false
          style: form
          explode: true
          schema: { type: array, maxItems: 100, items: { type: string, maxLength: 1000 } }
        - name: facet.query
          in: query
          required: false
          style: form
          explode: true
          schema: { type: array, maxItems: 100, items: { type: string, maxLength: 1000 } }
        - name: facet.size
          in: query
          description: |-
            Maximum number of facet terms to return. Effective upper bound is
            clamped by the configuration `query.facet.fields.size.max`.
          required: false
          schema: { type: integer, minimum: 0, maximum: 1000 }
        - name: facet.minDocCount
          in: query
          description: Minimum document count for a facet term to be included.
          required: false
          schema: { type: integer, format: int64, minimum: 0, maximum: 2147483647 }
        - name: facet.sort
          in: query
          required: false
          schema: { type: string }
        - name: facet.missing
          in: query
          required: false
          schema: { type: string }
        - name: geo.location.point
          in: query
          required: false
          schema: { type: string, example: "35.0,139.0" }
        - name: geo.location.distance
          in: query
          required: false
          schema: { type: string, example: 10km }
      responses:
        '200':
          description: Search executed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /documents/all:
    get:
      tags: [search]
      summary: Streaming scroll search (NDJSON)
      description: |-
        Streams every matching document as NDJSON. Each line is a
        `{"data": {...}}` object containing the document fields permitted by
        `QueryFieldConfig#isApiResponseField`. If a failure occurs mid-stream
        the handler emits a final
        `{"error":{"code":"internal_error","message":"stream error"}}` line
        and flushes. Clients MUST inspect the last line's first key to
        distinguish stream-complete from server-crashed.

        The query is built with the same parameter set as `GET /search`
        (`q`, `sort`, `num`, `lang`, `ex_q`, `sdh`, `fields.*`, `as.*`,
        `track_total_hits`, `facet.*`, `geo.*`). When scroll search is disabled
        via `api.search.scroll=false` the endpoint responds with
        `invalid_request` (400).
      operationId: scrollSearchV2
      parameters:
        - { $ref: '#/components/parameters/Q' }
        - name: sort
          in: query
          required: false
          schema: { type: string, maxLength: 1000 }
        - name: num
          in: query
          description: |-
            Page (scroll batch) size. Values `<= 0` produce `invalid_request`.
            Effective upper bound is clamped by `paging.search.page.max.size`.
          required: false
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: lang
          in: query
          required: false
          style: form
          explode: true
          schema: { type: array, maxItems: 100, items: { type: string, maxLength: 1000 } }
        - name: ex_q
          in: query
          description: Extra query expression; repeatable.
          required: false
          style: form
          explode: true
          schema: { type: array, maxItems: 100, items: { type: string, maxLength: 1000 } }
        - name: fields.label
          in: query
          description: |-
            Filter by label name; repeatable. Part of the generic
            `fields.<name>` family (see `GET /search`).
          required: false
          style: form
          explode: true
          schema: { type: array, maxItems: 100, items: { type: string, maxLength: 1000 } }
        - name: sdh
          in: query
          description: Similar-document hash.
          required: false
          schema: { type: string, maxLength: 1000 }
      responses:
        '200':
          description: |-
            NDJSON stream. Each successful line is a `{"data": <SearchHit>}`
            object whose document fields follow the same server-side allowlist
            (`QueryFieldConfig#isApiResponseField`) as `GET /search`; see the
            `SearchHit` schema for the exact fields and types. The collapse-only
            fields `similar_docs_count` / `similar_docs_hash` are never present
            on this scroll endpoint. If a failure occurs mid-stream the handler
            emits a final
            `{"error":{"code":"internal_error","message":"stream error"}}` line
            and flushes; clients MUST inspect the last line's first key to
            distinguish stream-complete from server-crashed.
          content:
            application/x-ndjson:
              schema:
                type: string
                description: |-
                  Newline-delimited JSON. Each line is either
                  `{"data": <SearchHit>}` (see the `SearchHit` schema) or, as the
                  final line on mid-stream failure, `{"error":{...}}`.
                example: |
                  {"data":{"url":"https://example.com/","title":"Example"}}
                  {"data":{"url":"https://example.org/","title":"Example Org"}}
        '400':
          description: |-
            Request was rejected as invalid (e.g. malformed query, `num <= 0`,
            or scroll search disabled via `api.search.scroll=false`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /suggest-words:
    get:
      tags: [suggest]
      summary: Suggest words for an input prefix
      operationId: suggestWordsV2
      parameters:
        - { $ref: '#/components/parameters/Q' }
        - name: num
          in: query
          description: |-
            Number of suggestions to return. Effective upper bound is clamped
            by `paging.search.page.max.size`.
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - name: fn
          in: query
          description: Suggest field name(s); repeatable.
          required: false
          style: form
          explode: true
          schema: { type: array, items: { type: string } }
        - name: lang
          in: query
          required: false
          style: form
          explode: true
          schema: { type: array, items: { type: string } }
        - name: label
          in: query
          required: false
          style: form
          explode: true
          schema: { type: array, items: { type: string } }
      responses:
        '200':
          description: Suggest words returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestWordsResponse'
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /labels:
    get:
      tags: [search]
      summary: List configured labels
      operationId: labelsV2
      responses:
        '200':
          description: Labels returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelsResponse'
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /popular-words:
    get:
      tags: [popularword]
      summary: List popular search words
      description: |-
        Returns `invalid_request` (400) when `web.api.popular.word=false`,
        matching v1's "unsupported operation" semantics.
      operationId: popularWordsV2
      parameters:
        - name: seed
          in: query
          required: false
          schema: { type: string }
        - name: label
          in: query
          required: false
          style: form
          explode: true
          schema: { type: array, items: { type: string } }
        - name: field
          in: query
          required: false
          style: form
          explode: true
          schema: { type: array, items: { type: string } }
      responses:
        '200':
          description: Words returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularWordsResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /related-queries:
    get:
      tags: [related]
      summary: Related query suggestions for a query
      description: |-
        Returns related query terms for the `q` parameter. A blank or absent
        `q` yields an empty `queries` array rather than an error; the response
        is always a success envelope.
      operationId: relatedQueriesV2
      parameters:
        - { $ref: '#/components/parameters/Q' }
      responses:
        '200':
          description: Related queries returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelatedQueriesResponse'
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /related-content:
    get:
      tags: [related]
      summary: Related HTML content for a query
      description: |-
        Returns related HTML content for the `q` parameter. When multiple
        content items match they are joined with a newline. A blank or absent
        `q` yields an empty `content` string rather than an error; the response
        is always a success envelope.
      operationId: relatedContentV2
      parameters:
        - { $ref: '#/components/parameters/Q' }
      responses:
        '200':
          description: Related content returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelatedContentResponse'
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /ui/config:
    get:
      tags: [ui]
      summary: UI bootstrap configuration
      description: |-
        Returns the bootstrap configuration needed by the SPA: theme,
        feature flags, pagination limits, and (when CSRF is required) a
        fresh CSRF token. Called anonymously before login.
      operationId: uiConfigV2
      responses:
        '200':
          description: Configuration returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UiConfigResponse'
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/me:
    get:
      tags: [auth]
      summary: Current authenticated user
      description: |-
        Returns `authenticated: false` for anonymous callers (never an
        error). When authenticated, `user` carries the same shape returned
        by `/auth/login`.
      operationId: authMeV2
      responses:
        '200':
          description: Authentication state returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/login:
    post:
      tags: [auth]
      summary: Log in with username and password
      description: |-
        On success, the servlet session id is rotated, a fresh CSRF token
        is issued, and the rate-limit buckets for the caller IP and the
        target user are cleared.

        Rate limiting has two scopes. The per-IP gate returns `429
        rate_limited` with a `Retry-After` header. The per-user gate is
        scoped to `(client IP, username)`; when it trips, the response is a
        generic `401 auth_required` with no `Retry-After` — identical to a
        credential rejection — so it does not disclose per-user rate-limit
        state.

        An already-authenticated session does not short-circuit; the
        supplied credentials are always verified.

        `return_to` must be a relative path matching
        `^/[A-Za-z0-9_\-/.?&=%:@+~#*!,;]*$`, and additionally must not be
        protocol-relative (no leading `//`) or contain ASCII control
        characters. Values that do not pass the allowlist are silently
        dropped from the echoed response.

        Unlike the other state-changing endpoints, this endpoint folds
        oversized request bodies and unsupported `Content-Type` headers
        into `400 invalid_request` (a deliberate simplification — clients
        should treat any 4xx body as a client error and inspect
        `error.code`). The other endpoints emit distinct `413` and `415`
        statuses.

        This endpoint is exempt from CSRF (no token exists prior to login).
      operationId: authLoginV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: |-
            Authentication is required or credentials were invalid. The
            per-user rate-limit gate (scoped to client IP + username) also
            returns this status, with no `Retry-After`, so user-scope
            throttling is indistinguishable from a credential rejection.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '429':
          description: |-
            Per-IP rate limit exceeded. The `Retry-After` header carries the
            cooldown in seconds. (The per-user gate does NOT use this status;
            it returns 401 — see above.)
          headers:
            Retry-After:
              description: Seconds the caller should wait before retrying.
              schema: { type: integer, minimum: 0 }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/logout:
    post:
      tags: [auth]
      summary: Log out (idempotent)
      description: |-
        Always returns `ok: true` — invoking logout with no active session
        is a no-op, not an error. Requires `X-Fess-CSRF-Token`.
      operationId: authLogoutV2
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      responses:
        '200':
          description: Session invalidated (or already absent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '403': { $ref: '#/components/responses/Forbidden' }
        '405':
          description: |-
            Non-POST method. The `Allow: POST` header is set.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          headers:
            Allow:
              schema: { type: string, example: POST }

  /auth/password:
    post:
      tags: [auth]
      summary: Change the current user's password
      description: |-
        Validates `current_password`, enforces the configured password
        policy on `new_password`, invalidates the current session (M-3),
        and signals the SPA via `re_login_required: true` so it redirects
        to the login page. Because the session is destroyed server-side,
        no `csrf_token` is returned; the SPA must obtain a fresh token
        after re-authenticating.
      operationId: authPasswordV2
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChangeResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /click:
    post:
      tags: [click]
      summary: Record a click on a search result
      description: |-
        Logs a click against the search log. Anonymous callers and
        installations with the search-log feature disabled produce a
        successful `logged: false` response (no error).
      operationId: clickV2
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClickRequest'
      responses:
        '200':
          description: Click accepted (logged or skipped).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClickResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /chat:
    post:
      tags: [chat]
      summary: One-shot RAG chat completion
      description: |-
        Synchronous chat completion. The session is identified by
        `session_id`; if omitted, the server creates one and returns it.

        Rate-limited per user at `api.v2.chat.rate.limit.per.user.per.minute`
        (default 30/min). The feature is disabled (`invalid_request`) when
        `rag.chat.enabled=false`.

        Invalid values supplied in `fields.label` or `extra_queries` are
        dropped silently from the resolved request — they are not surfaced to
        the caller in the response envelope.
      operationId: chatV2
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /chat/stream:
    post:
      tags: [chat]
      summary: Streaming RAG chat completion (SSE)
      description: |-
        Same request body as `/chat`, but the success response is a
        `text/event-stream` of named events:

        - `phase` — pipeline phase transitions
          (`{ phase, status, message?, keywords?, hit_count?, ... }`).
          `message` and `keywords` are emitted by `onPhaseStart`; additional
          optional fields (e.g. `hit_count`) flow through from
          `onPhaseComplete` payloads.
        - `chunk` — partial generated text (`{ content }`)
        - `sources` — retrieved sources (`{ sources: [ChatSource] }`)
        - `retry` — transient failure backoff
          (`{ phase, operation, attempt, max_attempts, sleep_ms, cause? }`)
        - `waiting` — long-running phase progress
          (`{ phase, reason, elapsed_ms, timeout_ms }`)
        - `fallback` — query rewrite or strategy fallback
          (`{ phase, reason, original_query?, new_query? }`)
        - `warning` — recoverable warning (`{ phase, code, detail? }`)
        - `done` — end of stream (`{ session_id, html_content? }`)
        - `error` — terminal mid-stream failure
          (`{ phase?, message, error_code }`). The `message` field carries the
          same string as `error_code`; clients should localize on `error_code`.

        Pre-stream validation failures still produce a JSON envelope
        (same error codes as `/chat`).

        Invalid values supplied in `fields.label` or `extra_queries` are
        dropped silently from the resolved request — they are not surfaced to
        the caller in the response envelope or in any SSE event.
      operationId: chatStreamV2
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: SSE stream of generation events.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: phase
                  data: {"phase":"search","status":"start","message":"Searching documents..."}

                  event: chunk
                  data: {"content":"Fess is "}

                  event: done
                  data: {"session_id":"abc"}
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /chat/sessions/{session_id}:
    delete:
      tags: [chat]
      summary: Clear the conversation history for a chat session
      description: |-
        Clear the conversation history for a given chat session. The session
        is identified by `session_id` in the path. Returns `cleared: true`
        on success. Returns `not_found` (404) when no active session matches
        the given id.

        Rate-limited per user at `api.v2.chat.rate.limit.per.user.per.minute`
        (shared with `POST /chat`). Requires `X-Fess-CSRF-Token`.
      operationId: chatClearSessionV2
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
        - name: session_id
          in: path
          required: true
          description: Identifies the session to clear.
          schema: { type: string, minLength: 1, maxLength: 100, pattern: '^[A-Za-z0-9._-]+$' }
      responses:
        '200':
          description: Session cleared.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatClearResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /favorites:
    get:
      tags: [favorite]
      summary: List favorited documents within a search result
      description: |-
        Returns the document ids in the search result identified by
        `query_id` that the calling user has previously favorited.
        The `query_id` is the opaque identifier echoed by `POST /search`.

        Anonymous callers (no session-bound user code) receive
        `auth_required` (401). When the `user.favorite` feature is
        disabled, the endpoint responds with `invalid_request` (400).
        When `query_id` matches no cached result set in the session,
        the endpoint responds with `200` and an empty `data` array.
      operationId: favoritesListV2
      parameters:
        - name: query_id
          in: query
          description: Opaque `query_id` echoed by `/search`.
          required: true
          schema: { type: string, maxLength: 100, pattern: '^[A-Za-z0-9_-]+$' }
      responses:
        '200':
          description: Favorited document ids returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoritesListResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /documents/{docId}/favorite:
    parameters:
      - { $ref: '#/components/parameters/DocId' }
    get:
      tags: [favorite]
      summary: Get favorite state for a document
      operationId: favoriteGetV2
      responses:
        '200':
          description: Favorite state returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteGetResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [favorite]
      summary: Mark a document as a favorite
      operationId: favoritePostV2
      parameters:
        - { $ref: '#/components/parameters/CsrfHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoritePostRequest'
      responses:
        '200':
          description: Document marked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoritePostResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /cache/{docId}:
    get:
      tags: [cache]
      summary: Cached HTML for a document
      description: |-
        Returns the cached, highlight-applied HTML for a document. When
        `app.login.required=true` and the caller is anonymous, responds
        with `auth_required` (401).
      operationId: cacheV2
      parameters:
        - { $ref: '#/components/parameters/DocId' }
        - name: hq
          in: query
          description: Highlight query term; repeatable.
          required: false
          style: form
          explode: true
          schema: { type: array, maxItems: 100, items: { type: string, maxLength: 1000 } }
      responses:
        '200':
          description: Cached content returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CacheResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '500': { $ref: '#/components/responses/InternalServerError' }

components:
  parameters:
    Q:
      name: q
      in: query
      description: Search query string.
      required: false
      schema: { type: string, maxLength: 1000, example: Fess }
    DocId:
      name: docId
      in: path
      description: Document identifier (matches `[A-Za-z0-9_-]+`).
      required: true
      schema: { type: string, minLength: 1, maxLength: 512, pattern: '^[A-Za-z0-9_-]+$' }
    CsrfHeader:
      name: X-Fess-CSRF-Token
      in: header
      description: |-
        CSRF token issued by `POST /auth/login` or `GET /ui/config`.
        Required for all state-changing requests.
      required: true
      schema: { type: string }

  responses:
    BadRequest:
      description: Request was rejected as invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Unauthorized:
      description: Authentication is required or credentials were invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Caller is not permitted (e.g. missing or stale CSRF token).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    MethodNotAllowed:
      description: |-
        HTTP method is not supported for this endpoint. The `Allow` header
        lists the supported methods.
      headers:
        Allow:
          description: Supported HTTP methods.
          required: true
          schema: { type: string, example: GET }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    PayloadTooLarge:
      description: Request body exceeded the endpoint's size limit.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    UnsupportedMediaType:
      description: |-
        Request `Content-Type` was not supported (most endpoints require
        `application/json`).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    RateLimited:
      description: |-
        Rate limit exceeded. The `Retry-After` header carries the cooldown
        in seconds.
      headers:
        Retry-After:
          description: Seconds the caller should wait before retrying.
          schema: { type: integer, minimum: 0 }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    InternalServerError:
      description: Unhandled server-side error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:
    # --- Envelope -----------------------------------------------------
    EnvelopeMeta:
      type: object
      description: Fields owned by the v2 response envelope.
      required: [status]
      properties:
        status:
          type: integer
          description: '`0` = success, `1` = client error, `9` = system error.'
          enum: [0, 1, 9]

    ErrorEnvelope:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [error]
              properties:
                error:
                  type: object
                  required: [code, message]
                  properties:
                    code:
                      type: string
                      description: Stable wire code. Clients should localize on this value.
                      enum:
                        - invalid_request
                        - auth_required
                        - forbidden
                        - not_found
                        - method_not_allowed
                        - not_acceptable
                        - conflict
                        - payload_too_large
                        - unsupported_media_type
                        - rate_limited
                        - internal_error
                        - service_unavailable
                    message:
                      type: string

    # --- Reusable user shape -----------------------------------------
    UserPayload:
      type: object
      required: [user_id, username, name, roles, groups, permissions, editable, admin]
      description: |-
        Authenticated-user descriptor used by `/auth/me` and `/auth/login`.
        All array fields are guaranteed non-null (empty arrays when no
        values are present).
      properties:
        user_id: { type: string }
        username:
          type: string
          description: |-
            Display username for the SPA account menu. Currently equals
            `user_id`; a future backend may supply it independently.
        name:
          type: string
          description: |-
            Display name for the SPA account menu. Currently equals
            `user_id`; a future backend may supply it independently.
        roles:
          type: array
          items: { type: string }
        groups:
          type: array
          items: { type: string }
        permissions:
          type: array
          items: { type: string }
        editable: { type: boolean }
        admin:
          type: boolean
          description: |-
            `true` when the user holds one of the configured
            `authentication.admin.roles`. Drives the visibility of the
            SPA "Administration" entry.

    # --- Health ------------------------------------------------------
    HealthResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [engine]
              properties:
                engine:
                  type: object
                  required: [status, ping_status]
                  properties:
                    status:
                      type: string
                      enum: [green, yellow, red]
                    ping_status: { type: integer }

    # --- Search ------------------------------------------------------
    SearchResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              properties:
                q: { type: string, nullable: true }
                query_id: { type: string }
                exec_time: { type: number, format: double }
                query_time: { type: integer, format: int64 }
                page_size: { type: integer }
                page_number: { type: integer }
                record_count: { type: integer, format: int64 }
                record_count_relation:
                  type: string
                  description: |-
                    `eq` when the count is exact, `gte` when only a lower bound is known.
                page_count: { type: integer }
                highlight_params: { type: string }
                next_page: { type: boolean }
                prev_page: { type: boolean }
                start_record_number: { type: integer }
                end_record_number: { type: integer }
                page_numbers:
                  type: array
                  items: { type: string }
                partial: { type: boolean }
                search_query: { type: string }
                requested_time: { type: integer, format: int64 }
                related_query:
                  type: array
                  items: { type: string }
                related_contents:
                  type: array
                  items: { type: string }
                data:
                  type: array
                  description: One entry per matching document.
                  items:
                    $ref: '#/components/schemas/SearchHit'
                facet_field:
                  type: array
                  description: Present only when facet fields were requested.
                  items:
                    type: object
                    required: [name, result]
                    properties:
                      name: { type: string }
                      result:
                        type: array
                        items:
                          type: object
                          required: [value, count]
                          properties:
                            value: { type: string }
                            count: { type: integer, format: int64 }
                facet_query:
                  type: array
                  description: Present only when facet queries were requested.
                  items:
                    type: object
                    required: [value, count]
                    properties:
                      value: { type: string }
                      count: { type: integer, format: int64 }

    SearchHit:
      type: object
      description: |-
        A single search hit derived from an indexed document. This object
        describes the `data[]` entries only (the sibling `related_query` /
        `related_contents` fields are a different, non-document channel).
        The set of emitted fields is server-side allowlisted by
        `QueryFieldConfig#isApiResponseField` (authoritative). ACL / role /
        internal fields (for example `role`, `virtual_host`, the raw
        `content` body) are never emitted. Null values and blank keys are
        dropped, so any given field MAY be absent (fields are therefore
        optional and never `null`). Operators can expose additional crawled
        fields via `query.additional.api.response.fields` (and dynamic
        language-template fields such as `*_ja` / `*_en` may pass through),
        which is why `additionalProperties` is `true`.
      properties:
        url: { type: string }
        title: { type: string }
        digest: { type: string }
        content_description: { type: string }
        content_title: { type: string }
        site: { type: string }
        site_path: { type: string }
        url_link: { type: string }
        host: { type: string }
        mimetype: { type: string }
        filetype: { type: string }
        filename: { type: string }
        content_length: { type: integer, format: int64 }
        last_modified: { type: string, format: date-time }
        timestamp: { type: string, format: date-time }
        created: { type: string, format: date-time }
        score: { type: number, format: float }
        boost: { type: number, format: float }
        doc_id: { type: string }
        _id:
          type: string
          description: OpenSearch document `_id` (the only metadata field exposed).
        thumbnail: { type: string }
        has_cache:
          type: string
          enum: ['true', 'false']
          description: Stored as the string `"true"`/`"false"`, not a JSON boolean.
        click_count: { type: integer, format: int64 }
        favorite_count: { type: integer, format: int64 }
        similar_docs_count:
          type: integer
          format: int64
          description: |-
            Present only when result collapsing is enabled and the group has
            duplicates. Never present on `/documents/all`.
        similar_docs_hash:
          type: string
          description: |-
            Present only when result collapsing is enabled. Never present on
            `/documents/all`.
      additionalProperties: true

    # --- Suggest / labels / popular ---------------------------------
    SuggestWordsResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [q, page_size, record_count, query_time, suggest_words]
              properties:
                q: { type: string }
                page_size: { type: integer }
                record_count: { type: integer, format: int64 }
                query_time: { type: integer, format: int64 }
                suggest_words:
                  type: array
                  items:
                    type: object
                    required: [text, types]
                    properties:
                      text: { type: string }
                      types:
                        type: array
                        items: { type: string }

    LabelsResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [record_count, labels]
              properties:
                record_count: { type: integer }
                labels:
                  type: array
                  items:
                    type: object
                    required: [label, value]
                    properties:
                      label: { type: string }
                      value: { type: string }

    PopularWordsResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [record_count, popular_words]
              properties:
                record_count: { type: integer }
                popular_words:
                  type: array
                  items: { type: string }

    # --- Related queries / content -----------------------------------
    RelatedQueriesResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [queries]
              properties:
                queries:
                  type: array
                  description: Related query terms; empty when `q` is blank or absent.
                  items: { type: string }

    RelatedContentResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [content, content_type]
              properties:
                content:
                  type: string
                  description: |-
                    Related HTML content; multiple items are newline-joined.
                    Empty string when `q` is blank or absent.
                content_type:
                  type: string
                  enum: [html]

    # --- UI config ---------------------------------------------------
    UiConfigResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required:
                - site_name
                - login_required
                - locales
                - theme
                - features
                - page_size_default
                - page_size_max
                - sort_options
                - num_options
                - lang_options
                - label_options
                - notifications
                - facet_views
                - filetype_options
                - csrf_required
                - csrf_token
              properties:
                site_name: { type: string }
                login_required: { type: boolean }
                locales:
                  type: array
                  items: { type: string }
                theme:
                  type: object
                  description: |-
                    Active theme descriptor. Always present; the object is
                    empty when no custom theme is bound to the request. The
                    manifest-derived keys (`display_name`, `version`,
                    `supported_locales`) are present only when the active
                    theme ships a manifest.
                  properties:
                    name: { type: string }
                    display_name: { type: string }
                    version: { type: string }
                    supported_locales:
                      type: array
                      items: { type: string }
                features:
                  type: object
                  required:
                    - user_favorite
                    - popular_word
                    - suggest_search_log
                    - suggest_documents
                    - login_required
                    - eoled
                    - development_mode
                    - search_log_enabled
                    - thumbnail_enabled
                    - display_label_type
                    - clipboard_copy_icon
                    - eol_link
                    - installation_link
                    - login_link
                    - rag_chat_enabled
                  properties:
                    user_favorite: { type: boolean }
                    popular_word: { type: boolean }
                    suggest_search_log: { type: boolean }
                    suggest_documents: { type: boolean }
                    login_required: { type: boolean }
                    eoled:
                      type: boolean
                      description: Whether this Fess build has reached end-of-life.
                    development_mode:
                      type: boolean
                      description: |-
                        `true` when the embedded (development) search engine is in use.
                    search_log_enabled: { type: boolean }
                    thumbnail_enabled: { type: boolean }
                    display_label_type:
                      type: boolean
                      description: '`true` when at least one label is configured.'
                    clipboard_copy_icon: { type: boolean }
                    eol_link:
                      type: string
                      description: |-
                        Resolved end-of-life information URL. Empty string when
                        the build is not EOL or the link cannot be resolved.
                    installation_link:
                      type: string
                      description: |-
                        Resolved installation guide URL. Empty string when it
                        cannot be resolved.
                    login_link:
                      type: boolean
                      description: Whether the login link should be shown.
                    rag_chat_enabled:
                      type: boolean
                      description: Whether the RAG chat feature is available.
                page_size_default: { type: integer }
                page_size_max: { type: integer }
                sort_options:
                  type: array
                  description: |-
                    Sort options for the search UI. `click_count.*` entries are
                    present only when search logging is enabled; `favorite_count.*`
                    only when user favorites are enabled.
                  items:
                    type: object
                    required: [value, label_key]
                    properties:
                      value: { type: string }
                      label_key: { type: string }
                num_options:
                  type: array
                  description: |-
                    Selectable page sizes, filtered to values not exceeding
                    `page_size_max`.
                  items: { type: integer }
                lang_options:
                  type: array
                  description: |-
                    Language filter options. The first entry is the `all`
                    sentinel, followed by one entry per supported language code.
                  items:
                    type: object
                    required: [value, label_key]
                    properties:
                      value: { type: string }
                      label_key: { type: string }
                label_options:
                  type: array
                  description: Configured labels; empty when none are defined.
                  items:
                    type: object
                    required: [value, name]
                    properties:
                      value: { type: string }
                      name: { type: string }
                notifications:
                  type: object
                  description: |-
                    HTML notification snippets shown at the top of specific
                    views. Empty string means no notification for that view.
                  required: [search_top, advance_search, login]
                  properties:
                    search_top: { type: string }
                    advance_search: { type: string }
                    login: { type: string }
                facet_views:
                  type: array
                  description: |-
                    Configured facet query view groups. Empty when none are
                    defined.
                  items:
                    type: object
                    required: [group_name, queries]
                    properties:
                      group_name: { type: string }
                      queries:
                        type: array
                        items:
                          type: object
                          required: [label_key, value]
                          properties:
                            label_key: { type: string }
                            value: { type: string }
                filetype_options:
                  type: array
                  description: File-type facet options for the advanced search form.
                  items:
                    type: object
                    required: [value, label_key]
                    properties:
                      value: { type: string }
                      label_key: { type: string }
                csrf_required: { type: boolean }
                csrf_token:
                  type: string
                  description: |-
                    A fresh CSRF token bound to the current session
                    (`csrf_required` is always `true`).

    # --- Auth --------------------------------------------------------
    AuthMeResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [authenticated]
              properties:
                authenticated: { type: boolean }
                user:
                  allOf:
                    - $ref: '#/components/schemas/UserPayload'
                  description: Present only when `authenticated` is `true`.

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, minLength: 1, maxLength: 100 }
        password: { type: string, minLength: 1, maxLength: 100 }
        return_to:
          type: string
          maxLength: 10000
          description: |-
            Optional post-login redirect target. Must be a relative path
            matching `^/[A-Za-z0-9_\-/.?&=%:@+~#*!,;]*$`. Additionally
            rejected (silently dropped from the echoed response): paths
            starting with `//` (protocol-relative) and paths containing
            ASCII control characters.
          pattern: '^/[A-Za-z0-9_\-/.?&=%:@+~#*!,;]*$'

    LoginResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [csrf_token]
              properties:
                user:
                  $ref: '#/components/schemas/UserPayload'
                csrf_token:
                  type: string
                  description: Fresh CSRF token bound to the new session.
                return_to:
                  type: string
                  description: Echoed only when the request value passed the allowlist.

    PasswordChangeRequest:
      type: object
      required: [current_password, new_password, confirm_password]
      properties:
        current_password: { type: string, minLength: 1, maxLength: 100 }
        new_password:
          type: string
          minLength: 1
          maxLength: 100
          description: Must satisfy the configured password policy.
        confirm_password:
          type: string
          minLength: 1
          maxLength: 100
          description: Must equal `new_password`.

    PasswordChangeResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [ok, re_login_required]
              properties:
                ok: { type: boolean, enum: [true] }
                re_login_required:
                  type: boolean
                  description: |-
                    Always `true`. The current session has been invalidated
                    server-side (M-3). The SPA MUST redirect to the login page
                    to obtain a fresh session and CSRF token.

    # --- Click -------------------------------------------------------
    ClickRequest:
      type: object
      required: [doc_id]
      properties:
        doc_id:
          type: string
          minLength: 1
          maxLength: 512
          pattern: '^[A-Za-z0-9_-]+$'
        query_id:
          type: string
          maxLength: 100
          pattern: '^[A-Za-z0-9_-]+$'
        rank:
          type: integer
          minimum: 1
          description: 1-based position in the result list.
        rt:
          type: integer
          format: int64
          minimum: 0
          maximum: 9999999999999
          description: |-
            Epoch milliseconds of the originating search request. Defaults
            to the server's current time when absent.

    ClickResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [ok, logged]
              properties:
                ok: { type: boolean, enum: [true] }
                logged:
                  type: boolean
                  description: |-
                    `false` when search-log persistence is disabled or the
                    caller is anonymous (still a 200 response).

    # --- Chat --------------------------------------------------------
    ChatRequest:
      description: |-
        `message` is required. The session is identified by `session_id`;
        if omitted, the server creates one and returns it in the response.
      allOf:
        - $ref: '#/components/schemas/ChatMessageRequest'

    ChatMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 4000
          description: |-
            The user message. The maximum length is bounded by
            `rag.chat.message.max.length` (default 4000); exceeding it
            returns `invalid_request` (HTTP 400).
        session_id:
          type: string
          maxLength: 100
          pattern: '^[A-Za-z0-9._-]+$'
        fields:
          type: object
          description: Optional filter fields for the retrieval step.
          properties:
            label:
              oneOf:
                - { type: string, maxLength: 1000 }
                - { type: array, maxItems: 100, items: { type: string, maxLength: 1000 } }
              description: Restricts retrieval to allowlisted labels.
        extra_queries:
          oneOf:
            - { type: string, maxLength: 1000 }
            - { type: array, maxItems: 100, items: { type: string, maxLength: 1000 } }
          description: Allowlisted facet query expressions.

    ChatSource:
      type: object
      description: A document referenced by the chat response.
      properties:
        rank:
          type: integer
          description: 1-based position of this source in the retrieved set.
        title: { type: string, nullable: true }
        url: { type: string, nullable: true }
        doc_id: { type: string, nullable: true }
        snippet: { type: string, nullable: true }
        url_link: { type: string, nullable: true }
        go_url: { type: string, nullable: true }

    ChatResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [session_id]
              properties:
                session_id: { type: string }
                content:
                  type: string
                  nullable: true
                  description: |-
                    The generated message text. Always present; may be `null`
                    when the model produced no content.
                sources:
                  type: array
                  items: { $ref: '#/components/schemas/ChatSource' }

    ChatClearResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [session_id, cleared]
              properties:
                session_id: { type: string }
                cleared:
                  type: boolean
                  enum: [true]
                  description: Always `true` when the session was found and cleared.

    # --- Favorite ----------------------------------------------------
    FavoritesListResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [record_count, data]
              properties:
                record_count:
                  type: integer
                  description: Number of favorited documents returned in `data`.
                data:
                  type: array
                  description: |
                    Favorited documents from the queried result set, preserving
                    the search result ordering.
                  items:
                    type: object
                    required: [doc_id]
                    additionalProperties: false
                    properties:
                      doc_id: { type: string }

    FavoriteGetResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [doc_id, favorite, count]
              properties:
                doc_id: { type: string }
                favorite: { type: boolean }
                count: { type: integer, format: int64 }

    FavoritePostRequest:
      type: object
      required: [query_id]
      properties:
        query_id:
          type: string
          maxLength: 100
          pattern: '^[A-Za-z0-9_-]+$'
          description: Opaque `query_id` echoed by `/search`.

    FavoritePostResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [doc_id, ok, favorite, count]
              properties:
                doc_id: { type: string }
                ok: { type: boolean, enum: [true] }
                favorite:
                  type: boolean
                  enum: [true]
                  description: |
                    Always `true` — the document is now marked as a favorite for the
                    calling user (whether freshly added or previously recorded).
                count:
                  type: integer
                  format: int64
                  description: |
                    Current favorite count for the document after the operation.
                    For a fresh add this is the pre-update count plus one (optimistic).
                    For an idempotent re-POST this reflects the stored count.
                already_existed:
                  type: boolean
                  description: |
                    True when the favorite was previously recorded (idempotent re-POST).
                    Absent on the first POST that newly records the favorite.

    # --- Cache -------------------------------------------------------
    CacheResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [doc_id, mimetype, content, charset]
              properties:
                doc_id: { type: string }
                mimetype:
                  type: string
                  enum: [text/html]
                content:
                  type: string
                  description: |-
                    Cached document body for the requested document. The
                    document is fetched role-filtered via
                    `getDocumentByDocId(userBean)`, so a caller only receives
                    content they are authorized to see. The fetch field set
                    (`getCacheResponseFields()`) contains no ACL or internal
                    fields.
                url:
                  type: string
                  description: |-
                    Document URL (the `url_link` field when present, otherwise
                    the raw indexed URL). Omitted when neither is available.
                created:
                  type: string
                  description: |-
                    Document creation timestamp from the index. Omitted when
                    absent.
                charset:
                  type: string
                  description: |-
                    Charset parsed from the document mimetype; defaults to
                    `UTF-8` when none is present.

    # --- Generic OK --------------------------------------------------
    OkResponse:
      type: object
      required: [response]
      properties:
        response:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              required: [ok]
              properties:
                ok: { type: boolean, enum: [true] }
