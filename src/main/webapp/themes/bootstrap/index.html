<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-src blob:; child-src blob:; frame-ancestors 'none'; base-uri 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fess</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/font-awesome.min.css">
  <link rel="stylesheet" href="/themes/bootstrap/assets/styles.css">
  <link rel="icon" href="/favicon.ico">

</head>
<body>
  <a href="#page-root" class="visually-hidden-focusable position-absolute top-0 start-0 m-2" data-i18n="aria.skip_to_main">Skip to main content</a>
  <!-- Visually-hidden h1 for screen readers and SEO; text is updated by i18n.js. -->
  <h1 class="visually-hidden" data-i18n="page.heading">Fess Search</h1>
  <header class="navbar navbar-expand-md fixed-top bg-dark d-print-none" data-bs-theme="dark" role="banner">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold d-flex align-items-center" href="/" id="brand-link"><img src="/images/logo-head.png" alt="" data-i18n-alt="labels.header_brand_name" class="brand-logo"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-nav" aria-controls="main-nav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
      <form class="d-flex flex-grow-1 mx-3 position-relative" id="search-form" role="search" aria-label="Site search">
        <input
            id="search-input"
            class="form-control"
            type="search"
            name="q"
            maxlength="1000"
            autocomplete="off"
            aria-label="Search query"
            data-i18n-placeholder="search.placeholder"
            role="combobox"
            aria-expanded="false"
            aria-controls="suggest-dropdown"
            aria-autocomplete="list"
            aria-haspopup="listbox">
        <button class="btn btn-primary ms-2" type="submit" id="search-submit" data-i18n="search.button">Search</button>
        <ul class="list-group position-absolute top-100 start-0 end-0 mt-1 d-none shadow-sm" id="suggest-dropdown" role="listbox" aria-label="Search suggestions" data-bs-theme="light"></ul>
      </form>
      <div class="collapse navbar-collapse" id="main-nav">
        <nav class="d-flex align-items-center me-2" aria-label="Site navigation">
          <a class="nav-link px-2" href="/advance" data-spa data-i18n="advance.link">Advanced</a>
          <a class="nav-link px-2 d-none" href="/chat" id="chat-nav-link" data-spa data-i18n="nav.chat_ai_mode">AI Search</a>
          <a class="nav-link px-2" href="/help" data-spa data-i18n="nav.help">Help</a>
        </nav>
        <!-- Warning indicators: EOL and development mode icons rendered by app.js -->
        <div id="warning-indicators" class="d-flex align-items-center" aria-live="polite" data-i18n-aria-label="aria.warning_indicators"></div>
        <div class="d-flex align-items-center gap-2" id="auth-controls" data-i18n-aria-label="aria.auth_controls">
          <button class="btn btn-outline-secondary btn-sm d-none" type="button" id="logout-btn" data-i18n="auth.logout">Logout</button>
          <button class="btn btn-outline-primary btn-sm" type="button" id="login-btn" data-bs-toggle="modal" data-bs-target="#login-modal" data-i18n="auth.login">Login</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container-fluid py-3" role="main" id="page-root">
    <!-- Home view: centered logo + large search box + popular words -->
    <section id="home-view" hidden class="container my-5">
      <!-- Notification banner for home/search-top view — rendered by app.js when
           notifications.search_top is non-empty in /api/v2/ui/config. -->
      <div id="home-notification" class="d-none" role="status" aria-live="polite"></div>
      <!-- Flash / message region: surfaced info/error messages (parity with index.jsp:123-130
           <la:info> / <la:errors>). Populated by app.js renderHomeFlash(). -->
      <div id="home-flash" class="d-none" role="alert" aria-live="assertive" aria-atomic="true"></div>
      <div class="text-center">
        <h2 class="mb-4"><img src="/images/logo.png" alt="" data-i18n-alt="labels.header_brand_name" class="home-logo"></h2>
        <form id="home-search-form" class="d-flex justify-content-center mb-3 position-relative" role="search" aria-label="Home search">
          <input id="home-search-input" type="search" class="form-control form-control-lg home-search-input"
                 name="q" maxlength="1000" autocomplete="off"
                 data-i18n-placeholder="search.placeholder"
                 role="combobox" aria-expanded="false" aria-controls="home-suggest-dropdown"
                 aria-autocomplete="list" aria-haspopup="listbox"
                 aria-label="Search query">
          <button type="submit" class="btn btn-primary btn-lg ms-2"
                  data-i18n="search.button">Search</button>
          <ul class="list-group suggest-dropdown position-absolute top-100 start-0 end-0 mt-1 d-none shadow-sm" id="home-suggest-dropdown" role="listbox" aria-label="Search suggestions"></ul>
        </form>
        <div class="mb-3">
          <button class="btn btn-link btn-sm" type="button" id="home-options-toggle"
                  data-bs-toggle="collapse" data-bs-target="#home-options"
                  aria-expanded="false" aria-controls="home-options" data-i18n="search.options">Options</button>
          <a class="btn btn-link btn-sm" href="/advance" data-spa id="home-advance-link" data-i18n="advance.link">Advanced</a>
        </div>
        <div class="collapse mb-4" id="home-options">
          <div class="d-flex gap-2 flex-wrap justify-content-center align-items-center">
            <label class="form-label me-1 mb-0 small" for="home-sort-select" data-i18n="search.sort">Sort</label>
            <select id="home-sort-select" class="form-select form-select-sm options-select" aria-label="Sort order"></select>
            <label class="form-label me-1 mb-0 small" for="home-num-select" data-i18n="search.num">Per page</label>
            <select id="home-num-select" class="form-select form-select-sm options-select" aria-label="Results per page"></select>
            <label class="form-label me-1 mb-0 small" for="home-lang-select" data-i18n="search.lang">Language</label>
            <select id="home-lang-select" class="form-select form-select-sm options-select" multiple aria-label="Language filter"></select>
            <!-- Label multi-select: rendered by search.js renderHomeOptions() when
                 features.display_label_type is true and label_options is non-empty
                 (parity with searchOptions.jsp:85-97 / parity-r3 Task 2). -->
            <label class="form-label me-1 mb-0 small d-none" for="home-label-select" data-i18n="search.labels">Labels</label>
            <select id="home-label-select" class="form-select form-select-sm options-select d-none" multiple aria-label="Label filter"></select>
            <button type="button" id="home-options-clear-btn" class="btn btn-outline-secondary btn-sm ms-1" data-i18n="facet.clear">Clear</button>
          </div>
        </div>
        <div id="home-popular-words" class="text-muted"></div>
      </div>
    </section>

    <section id="results-view">
      <!-- Notification banner for results view — rendered by app.js when
           notifications.search_top is non-empty in /api/v2/ui/config. -->
      <div id="results-notification" class="d-none mb-2" role="status" aria-live="polite"></div>
      <div id="search-error" class="alert alert-danger d-none mb-2" role="alert" aria-live="assertive"></div>
      <div class="row">
        <aside class="col-lg-3 col-md-4 mb-3" role="complementary" aria-label="Facets">
          <div class="offcanvas-md offcanvas-end" tabindex="-1" id="facet-offcanvas" aria-labelledby="facet-offcanvas-title">
            <div class="offcanvas-header d-md-none">
              <h5 class="offcanvas-title" id="facet-offcanvas-title" data-i18n="facet.title">Facets</h5>
              <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#facet-offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
              <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                  <strong data-i18n="facet.title">Facets</strong>
                  <button class="btn btn-link btn-sm p-0 d-none" id="facet-clear" data-i18n="facet.clear">Clear</button>
                </div>
                <div class="card-body" id="facet-body">
                  <p class="text-muted small mb-0" data-i18n="facet.empty">No facets yet — run a search.</p>
                </div>
              </div>
            </div>
          </div>
        </aside>

        <section class="col-lg-6 col-md-8" id="results-column">
          <button class="btn btn-outline-secondary btn-sm d-md-none mb-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#facet-offcanvas" aria-controls="facet-offcanvas" data-i18n-aria-label="facet.filter_button">
            <i class="fa fa-filter" aria-hidden="true"></i> <span data-i18n="facet.filter_button">Filters</span>
          </button>
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="text-muted small" id="results-meta" aria-live="polite" aria-atomic="true"></div>
          </div>
          <p id="results-status" class="text-muted small mb-2" aria-live="polite" aria-atomic="true"></p>
          <div id="results-popular-words" class="d-none mb-2 text-muted small" aria-live="polite"></div>
          <div id="similar-doc-banner" class="alert alert-info d-none align-items-center mb-2" role="status" aria-live="polite"></div>
          <ul id="current-filters" class="list-inline mb-2"></ul>
          <button class="btn btn-outline-secondary btn-sm mb-2" type="button" id="search-options-toggle"
                  data-bs-toggle="collapse" data-bs-target="#search-options"
                  aria-expanded="false" aria-controls="search-options"
                  data-i18n-aria-label="search.options">
            <i class="fa fa-cog" aria-hidden="true"></i>
          </button>
          <div id="search-options" class="collapse mb-3">
            <div class="d-flex gap-2 flex-wrap align-items-center">
              <label class="form-label me-1 mb-0 small" for="sort-select" data-i18n="search.sort">Sort</label>
              <select id="sort-select" class="form-select form-select-sm options-select" aria-label="Sort order"></select>
              <label class="form-label me-1 mb-0 small" for="num-select" data-i18n="search.num">Per page</label>
              <select id="num-select" class="form-select form-select-sm options-select" aria-label="Results per page"></select>
              <label class="form-label me-1 mb-0 small" for="lang-select" data-i18n="search.lang">Language</label>
              <select id="lang-select" class="form-select form-select-sm options-select" aria-label="Language filter"></select>
              <div class="dropdown" id="label-dropdown-wrap">
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" id="label-dropdown-btn"
                  data-bs-toggle="dropdown" aria-expanded="false" data-i18n="search.labels">Labels</button>
                <ul class="dropdown-menu label-dropdown-menu" id="label-dropdown-menu" aria-labelledby="label-dropdown-btn"></ul>
              </div>
              <div class="dropdown" id="geo-dropdown-wrap">
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" id="geo-dropdown-btn"
                  data-bs-toggle="dropdown" aria-expanded="false" data-i18n="search.geo">Location</button>
                <div class="dropdown-menu geo-dropdown-menu p-3" id="geo-dropdown-menu" aria-labelledby="geo-dropdown-btn">
                  <div class="mb-2">
                    <label for="geo-lat" class="form-label small mb-1" data-i18n="search.geo_lat">Latitude</label>
                    <input type="text" class="form-control form-control-sm" id="geo-lat" placeholder="e.g. 35.6895">
                  </div>
                  <div class="mb-2">
                    <label for="geo-lon" class="form-label small mb-1" data-i18n="search.geo_lon">Longitude</label>
                    <input type="text" class="form-control form-control-sm" id="geo-lon" placeholder="e.g. 139.6917">
                  </div>
                  <div class="mb-3">
                    <label for="geo-distance" class="form-label small mb-1" data-i18n="search.geo_distance">Distance (e.g. 1km)</label>
                    <input type="text" class="form-control form-control-sm" id="geo-distance" placeholder="e.g. 1km">
                  </div>
                  <div class="d-flex gap-2">
                    <button type="button" class="btn btn-primary btn-sm" id="geo-apply" data-i18n="search.geo_apply">Apply</button>
                    <button type="button" class="btn btn-outline-secondary btn-sm" id="geo-clear" data-i18n="search.geo_clear">Clear</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="d-none mb-2" id="related-queries" aria-live="polite" aria-label="Related searches"></div>
          <div class="d-none mb-2" id="related-content" aria-live="polite"></div>
          <div class="d-none mb-2" id="active-chips" aria-live="polite" aria-atomic="true" aria-label="Active filters"></div>
          <div id="results-warning" class="alert alert-warning d-none mb-2" role="status" aria-live="polite"></div>
          <ol class="list-unstyled" id="results" role="list"></ol>
          <nav aria-label="Pagination" class="d-none" id="pagination-nav">
            <ul class="pagination" id="pagination"></ul>
          </nav>
          <div class="text-center text-muted my-5 d-none" id="empty-state">
            <p class="mb-3"><i class="fa fa-search fa-3x" aria-hidden="true"></i></p>
            <p class="mb-2" id="empty-did-not-match"></p>
            <p class="mb-3" data-i18n="search.did_not_match_suggestion">Try different keywords or fewer keywords.</p>
            <div id="popular-words"></div>
          </div>
        </section>

        <aside class="col-lg-3 d-none" id="chat-column" role="complementary" aria-label="Chat"></aside>
      </div>
    </section>

    <section id="advance-view" hidden class="container my-4">
      <!-- Notification banner for advance search view — rendered by app.js when
           notifications.advance_search is non-empty in /api/v2/ui/config. -->
      <div id="advance-notification" class="d-none" role="status" aria-live="polite"></div>
    </section>
    <section id="error-view" hidden class="container my-4"></section>
    <section id="profile-view" hidden class="container my-4"></section>
    <section id="help-view" hidden class="container my-4"></section>
    <!-- chat-progress-message is created dynamically inside #chat-view by chat.js -->
    <section id="chat-view" hidden class="container-fluid my-3"></section>
    <section id="cache-view" hidden class="container my-3"></section>
  </main>

  <footer class="container-fluid py-3 border-top text-center text-muted small" role="contentinfo" data-i18n-aria-label="aria.footer">
    <small id="footer-copyright"></small>
  </footer>

  <!-- Back to top button -->
  <button id="back-to-top"
          class="btn btn-secondary position-fixed back-to-top is-hidden"
          aria-label="Back to top"
          data-i18n-aria-label="footer.back_to_top">
    <i class="fa fa-arrow-up" aria-hidden="true"></i>
  </button>

  <!-- Login modal -->
  <div class="modal fade" id="login-modal" tabindex="-1" aria-labelledby="login-modal-title" aria-hidden="true">
    <div class="modal-dialog">
      <form class="modal-content" id="login-form">
        <div class="modal-header">
          <h5 class="modal-title" id="login-modal-title" data-i18n="auth.login">Login</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-danger d-none" id="login-error" role="alert"></div>
          <div class="mb-3">
            <label for="login-username" class="form-label" data-i18n="auth.username">Username</label>
            <input class="form-control" id="login-username" name="username" autocomplete="username" required>
          </div>
          <div class="mb-3">
            <label for="login-password" class="form-label" data-i18n="auth.password">Password</label>
            <input class="form-control" id="login-password" name="password" type="password" autocomplete="current-password" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="auth.cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" data-i18n="auth.login">Login</button>
        </div>
      </form>
    </div>
  </div>

  <!--
    Load order matters: bootstrap.min.js (classic defer) MUST appear before
    app.js (type="module") in document order. Both are deferred, but browsers
    execute classic-defer scripts before module scripts that follow them, so
    window.bootstrap is populated before any module callback runs.
    If you move app.js above bootstrap.min.js, modal interactions will throw
    TypeError because window.bootstrap will be undefined at callback time.
  -->
  <script src="/js/bootstrap.min.js" defer></script>
  <script type="module" src="/themes/bootstrap/assets/app.js"></script>
</body>
</html>
